on:
  push:
    branches:
      - master
name: 🚀 Deploy doctrine wiki on push
jobs:
  web-deploy:
    name: 🎉 Deploy
    runs-on: ubuntu-latest
    steps:
    - name: 🚚 Get latest code
      uses: actions/checkout@v4

    - name: 📂 Sync files
      uses: SamKirkland/FTP-Deploy-Action@v4.3.6
      with:
        server: ${{ secrets.ftp_host }}
        username: ${{ secrets.ftp_user }}
        password: ${{ secrets.ftp_pass }}
        protocol: ftps
        # Only the published site is reader-facing; the repo's meta files
        # (CLAUDE.md, project.md, log.md, todo/, etc.) must never hit the server.
        local-dir: ./docs/
        server-dir: /
        exclude: |
          **/.git*
          **/.git*/**
          **/.vscode/**
          **/.idea/**
          **/.claude/**
          **/__pycache__/**
          **/.DS_Store
          **/.env*
          **/*.swp
          **/*.swo
          **/*~
          **/*.tmp
          **/*.bak
          **/*.log
